name: Build Mac

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac-realmrender:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set RealmRender config
        run: cp config-rr.json config.json

      - name: Build RealmRender Mac
        run: npx electron-builder --mac --config electron-builder-rr.json

      - name: Upload RealmRender Mac
        uses: actions/upload-artifact@v4
        with:
          name: RealmRender-Mac
          path: dist/*.dmg

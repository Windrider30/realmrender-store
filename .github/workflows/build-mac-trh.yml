name: Build Mac - The Rabbit Hole

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac-trh:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set Rabbit Hole config
        run: cp config-trh.json config.json

      - name: Build The Rabbit Hole Mac
        run: npx electron-builder --mac --config electron-builder-trh.json --publish never

      - name: Upload The Rabbit Hole Mac
        uses: actions/upload-artifact@v4
        with:
          name: TheRabbitHole-Mac
          path: dist/*.dmg

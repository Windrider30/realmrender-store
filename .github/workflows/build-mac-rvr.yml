name: Build Mac - Red Velvet Revolver

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac-rvr:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Set RVR config
        run: cp config-rvr.json config.json

      - name: Build Red Velvet Revolver Mac
        run: npx electron-builder --mac --config electron-builder-rvr.json --publish never

      - name: Upload Red Velvet Revolver Mac
        uses: actions/upload-artifact@v4
        with:
          name: RedVelvetRevolver-Mac
          path: dist/*.dmg

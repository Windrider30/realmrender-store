<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store</title>
<style>
/* ── DEFAULTS (overridden at runtime by Settings sheet) ── */
:root {
  --bg:       #0D0D0D;
  --card:     #1a1a1f;
  --card2:    #141418;
  --primary:  #6A00FF;
  --secondary:#00F0FF;
  --accent:   #FF2E88;
  --text:     #E8E8F0;
  --muted:    #777788;
  --p-dim:    rgba(106,0,255,0.15);
  --p-glow:   rgba(106,0,255,0.4);
  --s-glow:   rgba(0,240,255,0.35);
  --line:     rgba(106,0,255,0.18);
  --line2:    rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow-x: hidden; }

/* ── BG ── */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(50% 40% at 50% 30%, var(--p-dim), transparent 60%),
              linear-gradient(180deg, rgba(0,0,0,0.2), rgba(0,0,0,0.92)); }

/* ── TOPBAR ── */
.topbar { position: relative; z-index: 10; text-align: center; padding: 32px 20px 6px; }
.topbar .eyebrow { font-size: 10px; letter-spacing: 5px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; opacity: 0.8; display: none; }
.topbar .eyebrow.visible { display: block; }
.topbar h1 { font-size: 38px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
  background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
  background-size: 300%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: brandPulse 10s ease-in-out infinite; }
@keyframes brandPulse { 0%,100%{background-position:0%} 50%{background-position:300%} }
.topbar .tagline { color: var(--muted); font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }

/* ── NAV ── */
.nav-bar { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 14px 20px; flex-wrap: wrap; }
.nav-btn { padding: 9px 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid var(--line); border-radius: 30px; background: transparent; color: var(--muted); cursor: pointer; transition: .2s; }
.nav-btn:hover, .nav-btn.active { color: var(--bg); background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-color: transparent; box-shadow: 0 0 20px var(--p-glow); }
.nav-btn.nav-link { border-color: var(--line2); }
.nav-btn.nav-link:hover { background: var(--primary); color: #fff; border-color: transparent; }

/* ── SOCIAL BAR ── */
.social-link { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px;
  border-radius:50%; border:1px solid var(--line); color:var(--muted); text-decoration:none;
  font-size:15px; transition:.2s; }
.social-link:hover { border-color:var(--primary); color:var(--primary); box-shadow:0 0 12px var(--p-glow); }

/* ── HAMBURGER ── */
.hamburger-btn { padding: 9px 14px; font-size: 18px; font-weight: 700; line-height: 1;
  border: 1px solid var(--line); border-radius: 30px; background: transparent; color: var(--muted);
  cursor: pointer; transition: .2s; display: flex; align-items: center; gap: 6px; }
.hamburger-btn:hover { color: var(--text); border-color: var(--line2); }
.hamburger-btn.has-active { color: var(--bg); background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-color: transparent; box-shadow: 0 0 20px var(--p-glow); }
.side-panel-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.5); }
.side-panel-overlay.open { display: block; }
.side-panel { position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; z-index: 501;
  background: var(--card); border-right: 1px solid var(--line); padding: 24px 16px;
  display: flex; flex-direction: column; gap: 6px; overflow-y: auto;
  transition: left .25s cubic-bezier(.4,0,.2,1); }
.side-panel.open { left: 0; }
.side-panel-title { font-size: 10px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase;
  color: var(--muted); padding: 8px 12px 4px; margin-top: 8px; }
.side-panel-title:first-child { margin-top: 0; }
.panel-btn { padding: 11px 16px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid transparent; border-radius: 10px; background: transparent; color: var(--muted);
  cursor: pointer; transition: .2s; text-align: left; width: 100%; }
.panel-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: var(--line); }
.panel-btn.active { color: var(--bg); background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-color: transparent; }
.side-panel-divider { height: 1px; background: var(--line); margin: 8px 0; }

/* ── LOGIN BAR ── */
.login-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 8px; padding: 0 20px 10px; flex-wrap: wrap; align-items: center; }
.login-bar input { padding: 9px 16px; font-size: 13px; border-radius: 30px; border: 1px solid var(--line);
  background: var(--card); color: var(--text); width: 260px; text-align: center; }
.login-bar input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--p-dim); }
.login-bar button { padding: 9px 20px; font-size: 12px; font-weight: 700; border-radius: 30px; border: none;
  background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--bg); cursor: pointer; transition: .2s; }
.login-bar button:hover { box-shadow: 0 0 20px var(--p-glow); }
.login-bar .logout-btn { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--line2); }
.login-bar .user-email { color: var(--secondary); font-size: 12px; font-weight: 700; padding: 9px 0; letter-spacing: .5px; }

/* ── SHOWCASE CUBES ── */
.showcase-section { position: relative; z-index: 10; text-align: center; padding: 8px 20px 32px; }
.showcase-label { font-size: 10px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--secondary); margin-bottom: 6px; }
.showcase-title { font-size: 20px; font-weight: 900; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.showcase-sub { font-size: 11px; color: var(--muted); margin-bottom: 18px; }
.cube-row { display: flex; gap: 100px; justify-content: center; flex-wrap: wrap; align-items: center; }

/* ── STORE SECTION ── */
.store-section { position: relative; z-index: 10; max-width: 1280px; margin: 0 auto; padding: 16px 24px 60px; }
.section-title { font-size: 13px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--secondary); margin-bottom: 18px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

/* ── PRODUCT CARD ── */
.product-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
  cursor: pointer; transition: .25s; position: relative; }
.product-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 12px 40px var(--p-glow); }
.card-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #111; }
.card-image-placeholder { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #111, #1a1a2e); font-size: 48px; }
.card-body { padding: 14px 16px 16px; }
.card-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price { font-size: 16px; font-weight: 900;
  background: linear-gradient(90deg, var(--secondary), var(--primary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card-price.free { background: linear-gradient(90deg, #00ff88, var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 9px; padding: 3px 8px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.tag-featured { background: var(--p-dim); color: var(--primary); border: 1px solid rgba(106,0,255,0.3); }
.tag-premium  { background: rgba(0,240,255,0.1); color: var(--secondary); border: 1px solid rgba(0,240,255,0.3); }
.tag-new      { background: rgba(255,46,136,0.1); color: var(--accent); border: 1px solid rgba(255,46,136,0.3); }

/* ── FAVORITE BUTTON ── */
.card-fav { position: absolute; top: 10px; right: 10px; z-index: 5; width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); color: var(--muted);
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s; }
.card-fav:hover { background: var(--p-dim); color: #fff; }
.card-fav.active { color: var(--accent); background: rgba(255,46,136,0.2); }

/* ── LOCKED OVERLAY ── */
.card-locked { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; border-radius: 16px; opacity: 0; transition: .25s; }
.product-card:hover .card-locked { opacity: 1; }
.card-locked .lock-icon { font-size: 36px; }
.card-locked .lock-label { font-size: 13px; font-weight: 700; color: var(--secondary); letter-spacing: 1px; }
.btn-buy { padding: 10px 28px; border: none; border-radius: 30px; font-size: 12px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--bg); cursor: pointer; transition: .2s; }
.btn-buy:hover { box-shadow: 0 0 24px var(--s-glow); transform: scale(1.05); }

/* ── MESSAGE BOARD ── */
.board-section { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; padding: 16px 24px 60px; }
.board-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.board-tab { padding: 7px 18px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid var(--line); border-radius: 30px; background: transparent; color: var(--muted); cursor: pointer; transition: .2s; }
.board-tab.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.board-compose { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 24px; }
.board-compose input, .board-compose textarea {
  width: 100%; box-sizing: border-box; background: var(--bg); border: 1px solid var(--line2);
  border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 10px 14px; margin-bottom: 10px; resize: vertical; }
.board-compose textarea { min-height: 80px; }
.board-compose .compose-row { display: flex; gap: 10px; align-items: center; }
.board-compose .compose-row input { margin-bottom: 0; flex: 1; }
.btn-post { padding: 10px 24px; background: var(--primary); border: none; border-radius: 30px;
  color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: .2s; white-space: nowrap; }
.btn-post:hover { opacity: .85; }
.board-messages { display: flex; flex-direction: column; gap: 12px; }
.board-msg { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; position: relative; }
.board-msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.board-msg-name { font-size: 12px; font-weight: 700; color: var(--primary); }
.board-msg-time { font-size: 10px; color: var(--muted); }
.board-msg-text { font-size: 13px; color: var(--text); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.btn-delete-msg { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: .2s; }
.btn-delete-msg:hover { color: #ff4466; background: rgba(255,68,102,0.1); }
.board-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 40px 0; }
.board-login-notice { background: var(--card); border: 1px solid var(--line); border-radius: 10px;
  padding: 16px; text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 16px; }

/* ── IFRAME OVERLAY ── */
.iframe-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.94); }
.iframe-overlay.open { display: flex; flex-direction: column; }
.iframe-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;
  background: var(--card2); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.iframe-title { font-size: 14px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.iframe-close { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); background: transparent;
  color: var(--text); font-size: 18px; cursor: pointer; transition: .2s; display: flex; align-items: center; justify-content: center; }
.iframe-close:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.iframe-container { flex: 1; }
.iframe-container iframe { width: 100%; height: 100%; border: none; background: var(--bg); }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 80px 20px; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--primary);
  border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg) } }
.loading-text { color: var(--muted); font-size: 13px; letter-spacing: 2px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 32px;
  width: 90%; max-width: 420px; text-align: center; }
.modal-box h2 { font-size: 20px; font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.modal-input { width: 100%; padding: 12px 16px; font-size: 14px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--bg); color: var(--text); text-align: center; font-weight: 700; }
.modal-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--p-dim); }
.modal-input.error { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
.modal-submit { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--bg); }
.modal-cancel { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--line2) !important; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); z-index: 1100;
  padding: 12px 28px; border-radius: 30px; font-size: 13px; font-weight: 800; color: var(--bg);
  background: linear-gradient(135deg, var(--primary), var(--secondary)); box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none; transition: .3s; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BUNDLE PICKER ── */
.bundle-picker { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92);
  align-items: center; justify-content: center; }
.bundle-picker.open { display: flex; }
.bundle-picker-box { background: var(--card); border: 1px solid var(--line); border-radius: 18px;
  padding: 28px; width: 90%; max-width: 520px; }
.bundle-picker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.bundle-picker-title { font-size: 18px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.bundle-picker-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line);
  background: transparent; color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.bundle-picker-close:hover { background: var(--accent); border-color: var(--accent); }
.bundle-picker-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.bundle-item { display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.02); }
.bundle-item-title { font-size: 14px; font-weight: 700; }
.bundle-item-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.btn-launch { padding: 8px 20px; border: none; border-radius: 30px; font-size: 11px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--primary), var(--secondary)); color: var(--bg); cursor: pointer; white-space: nowrap; transition: .2s; }
.btn-launch:hover { box-shadow: 0 0 18px var(--s-glow); transform: scale(1.04); }
.bundle-item-locked { opacity: 0.4; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .topbar h1 { font-size: 24px; letter-spacing: 3px; }
  .product-grid { grid-template-columns: 1fr; }
  .store-section { padding: 16px 14px 40px; }
  .cube-row { gap: 40px; }
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="bg-vignette"></div>

<div class="topbar">
  <p class="eyebrow" id="eyebrow"></p>
  <img id="brandLogo" src="" alt="" style="display:none;max-height:120px;max-width:360px;object-fit:contain;margin:0 auto 12px;">
  <h1 id="brandName">Store</h1>
  <p class="tagline" id="brandTagline"></p>
  <div id="socialBar" style="display:none;justify-content:center;gap:14px;margin-top:10px;flex-wrap:wrap;"></div>
</div>

<div class="nav-bar" id="navBar">
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidePanel()">&#9776; Menu</button>
  <button class="nav-btn active" onclick="filterCategory('all')">All</button>
  <button class="nav-btn" onclick="filterCategory('favorites')">&#9825; Favorites</button>
  <button class="nav-btn" onclick="filterCategory('library')">&#128218; My Library</button>
  <button class="nav-btn" onclick="refreshStore()" style="margin-left:auto;border-color:var(--line2);">&#x21bb; Refresh</button>
</div>

<!-- SIDE PANEL -->
<div class="side-panel-overlay" id="sidePanelOverlay" onclick="closeSidePanel()"></div>
<div class="side-panel" id="sidePanel">
  <p class="side-panel-title">Categories</p>
  <div id="panelNavItems"></div>
  <div class="side-panel-divider"></div>
  <p class="side-panel-title">Community</p>
  <button class="panel-btn" id="panelCommunityBtn" onclick="panelOpenBoard()">💬 Community Board</button>
</div>

<div id="loginBar" class="login-bar"></div>

<!-- FEATURED PRODUCTS -->
<div id="featuredSection" style="display:none;padding:0 32px 8px;position:relative;z-index:10;max-width:1280px;margin:0 auto;">
  <p class="section-title" id="featuredLabel">&#10024; Featured</p>
  <div id="featuredGrid" class="product-grid"></div>
</div>

<!-- SHOWCASE CUBES -->
<div class="showcase-section" id="showcaseSection" style="display:none;">
  <p class="showcase-label" id="showcaseLabel">Sample Outputs</p>
  <h2 class="showcase-title" id="showcaseTitle">See What Gets Created</h2>
  <p class="showcase-sub">Drag to spin &middot; Click to expand</p>
  <div class="cube-row">
    <photo-cube id="cube1" size="260"
      front="YOUR_PHOTO_URL_HERE" back="YOUR_PHOTO_URL_HERE" left="YOUR_PHOTO_URL_HERE"
      right="YOUR_PHOTO_URL_HERE" top="YOUR_PHOTO_URL_HERE" bottom="YOUR_PHOTO_URL_HERE">
    </photo-cube>
    <photo-cube id="cube2" size="260"
      front="YOUR_PHOTO_URL_HERE" back="YOUR_PHOTO_URL_HERE" left="YOUR_PHOTO_URL_HERE"
      right="YOUR_PHOTO_URL_HERE" top="YOUR_PHOTO_URL_HERE" bottom="YOUR_PHOTO_URL_HERE">
    </photo-cube>
  </div>
</div>

<div class="store-section">
  <div style="margin-top:24px;">
    <p class="section-title" id="allLabel">&#128293; All Products</p>
    <div id="productGrid" class="product-grid"></div>
  </div>
  <div id="loadingState" class="loading-state">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loadingText">Loading...</p>
  </div>
</div>

<!-- MESSAGE BOARD -->
<div id="boardSection" style="display:none;">
  <div class="board-section">
    <div class="board-tabs" id="boardTabs"></div>
    <div id="boardLoginNotice" class="board-login-notice" style="display:none;">
      Sign in to post on the Buyers board and category boards.
    </div>
    <div class="board-compose" id="boardCompose">
      <div class="compose-row">
        <input type="text" id="boardName" placeholder="Your name (optional)" maxlength="50">
        <button class="btn-post" onclick="submitPost()">Post</button>
      </div>
      <textarea id="boardMessage" placeholder="Write a message..." maxlength="1000"></textarea>
    </div>
    <div class="board-messages" id="boardMessages"></div>
  </div>
</div>

<!-- IFRAME OVERLAY -->
<div id="iframeOverlay" class="iframe-overlay">
  <div class="iframe-topbar">
    <span id="iframeTitle" class="iframe-title"></span>
    <button class="iframe-close" onclick="closeOverlay()">&times;</button>
  </div>
  <div class="iframe-container">
    <webview id="generatorFrame" allowpopups style="width:100%;height:100%;border:none;background:#0D0D0D;"></webview>
  </div>
</div>

<!-- BUNDLE PICKER -->
<div id="bundlePicker" class="bundle-picker">
  <div class="bundle-picker-box">
    <div class="bundle-picker-header">
      <span id="bundlePickerTitle" class="bundle-picker-title"></span>
      <button class="bundle-picker-close" onclick="closeBundlePicker()">&times;</button>
    </div>
    <p id="bundlePickerSub" class="bundle-picker-sub"></p>
    <div id="bundlePickerList"></div>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay">
  <div class="modal-box">
    <h2>Sign In</h2>
    <p>Enter the email you used to purchase</p>
    <input type="email" id="loginEmailInput" class="modal-input" placeholder="your@email.com" autocomplete="email">
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeLoginModal()">Cancel</button>
      <button class="modal-submit" onclick="submitLogin()">Sign In</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   UNIVERSAL STORE ENGINE
   Everything controlled by Google Sheet:
     Settings tab  — brand, colors, cube photos, labels
     Nav tab        — navigation buttons
     Products tab   — store products
     Bundles tab    — bundle contents
   ═══════════════════════════════════════════════════════ */

// ━━━ CONFIG (injected by Electron via query params) ━━━
var _p = new URLSearchParams(window.location.search);
var SHEET_ID        = _p.get('sheetId') || '';
var APPS_SCRIPT_URL = _p.get('appsScriptUrl') || '';
var SHEET_NAME      = 'Products';
var EMAIL_KEY       = _p.get('emailKey') || 'store_email';
var FAV_KEY         = _p.get('favKey')   || 'store_favorites';

// ━━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var PRODUCTS      = [];
var UNLOCKED      = {};
var NAV_ITEMS     = [];
var USER_EMAIL    = localStorage.getItem(EMAIL_KEY) || '';
var currentFilter = 'all';
var pendingProduct = null;
var FAVORITES     = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');

// ━━━ STARTUP SEQUENCE ━━━━━━━━━━━━━━━━━━━━━━━━━
function boot() {
  renderLoginBar();
  // Load settings first (colors/brand), then nav, then products in parallel
  loadSettings(function() {
    loadNav();
    loadProducts();
    loadBundles();
  });
  if (USER_EMAIL) doLogin(USER_EMAIL, true);
}

// ━━━ SETTINGS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Sheet tab: Settings — columns: Key | Value
// Keys: brand_name, brand_tagline, eyebrow_text, window_title, loading_text,
//       featured_label, all_label, showcase_label, showcase_title,
//       color_bg, color_card, color_primary, color_secondary, color_accent, color_text, color_muted,
//       cube_front..bottom, cube2_front..bottom
function loadSettings(callback) {
  var promise;
  if (window.electronAPI && window.electronAPI.loadSettings) {
    promise = window.electronAPI.loadSettings();
  } else if (APPS_SCRIPT_URL) {
    promise = fetch(APPS_SCRIPT_URL + '?action=getSettings' + (SHEET_ID ? '&sheetId=' + encodeURIComponent(SHEET_ID) : '')).then(function(r) { return r.json(); });
  } else {
    if (callback) callback();
    return;
  }
  promise
    .then(function(result) {
      if (result.success && result.settings) applySettings(result.settings);
      if (callback) callback();
    })
    .catch(function() { if (callback) callback(); });
}

function applySettings(s) {
  // Brand text
  if (s.brand_name)    { document.getElementById('brandName').textContent = s.brand_name; document.title = s.window_title || s.brand_name; }
  if (s.brand_tagline) document.getElementById('brandTagline').textContent = s.brand_tagline;
  if (s.eyebrow_text)  { var ey = document.getElementById('eyebrow'); ey.textContent = s.eyebrow_text; ey.classList.add('visible'); }
  if (s.brand_logo)    { var logo = document.getElementById('brandLogo'); logo.src = s.brand_logo; logo.style.display = 'block'; }

  // Social links
  var socialDefs = [
    { key: 'social_instagram', icon: '📸', label: 'Instagram' },
    { key: 'social_tiktok',    icon: '🎵', label: 'TikTok' },
    { key: 'social_facebook',  icon: '👥', label: 'Facebook' },
    { key: 'social_youtube',   icon: '▶', label: 'YouTube' },
    { key: 'social_twitter',   icon: '𝕏', label: 'Twitter/X' },
    { key: 'social_discord',   icon: '💬', label: 'Discord' },
    { key: 'social_pinterest', icon: '📌', label: 'Pinterest' },
    { key: 'social_linkedin',  icon: '💼', label: 'LinkedIn' },
    { key: 'social_website',   icon: '🌐', label: 'Website' }
  ];
  var socialBar = document.getElementById('socialBar');
  var socialHtml = '';
  socialDefs.forEach(function(def) {
    if (s[def.key]) {
      socialHtml += '<a class="social-link" href="' + s[def.key] + '" title="' + def.label + '" onclick="event.preventDefault();openExternal(\'' + s[def.key] + '\')">' + def.icon + '</a>';
    }
  });
  if (socialHtml) { socialBar.innerHTML = socialHtml; socialBar.style.display = 'flex'; }
  if (s.loading_text)  document.getElementById('loadingText').textContent = s.loading_text;
  if (s.featured_label) document.getElementById('featuredLabel').textContent = s.featured_label;
  if (s.all_label)      document.getElementById('allLabel').textContent = s.all_label;
  if (s.showcase_label) document.getElementById('showcaseLabel').textContent = s.showcase_label;
  if (s.showcase_title) document.getElementById('showcaseTitle').textContent = s.showcase_title;

  // Colors — inject into :root and recompute derived values
  var root = document.documentElement.style;
  function set(k, v) { if (v) root.setProperty(k, v); }
  set('--bg',        s.color_bg);
  set('--card',      s.color_card);
  set('--text',      s.color_text);
  set('--muted',     s.color_muted);

  if (s.color_primary) {
    set('--primary', s.color_primary);
    var pr = hexToRgb(s.color_primary);
    if (pr) {
      set('--p-dim',  'rgba(' + pr + ',0.15)');
      set('--p-glow', 'rgba(' + pr + ',0.4)');
      set('--line',   'rgba(' + pr + ',0.18)');
    }
  }
  if (s.color_secondary) {
    set('--secondary', s.color_secondary);
    var sr = hexToRgb(s.color_secondary);
    if (sr) set('--s-glow', 'rgba(' + sr + ',0.35)');
  }
  set('--accent', s.color_accent);

  // Cube photos
  applyCubePhotos(s);
}

function hexToRgb(hex) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex.split('').map(function(c) { return c+c; }).join('');
  var n = parseInt(hex, 16);
  if (isNaN(n)) return null;
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255].join(',');
}

function applyCubePhotos(s) {
  var faces = ['front','back','left','right','top','bottom'];
  var anySection = false;
  [['cube1','cube_'],['cube2','cube2_']].forEach(function(pair) {
    var cube = document.getElementById(pair[0]);
    if (!cube) return;
    var hasAny = false;
    faces.forEach(function(f) { var u = s[pair[1]+f]; if (u) { cube.setAttribute(f, u); hasAny = true; } });
    if (hasAny) { cube.innerHTML = ''; if (cube.connectedCallback) cube.connectedCallback(); anySection = true; }
  });
  if (anySection) { var sec = document.getElementById('showcaseSection'); if (sec) sec.style.display = ''; }
}

// ━━━ NAV (dynamic from sheet) ━━━━━━━━━━━━━━━━━
// Sheet tab: Nav — columns: Label | Category | URL
// Category filled  → filters products by that category
// URL filled       → opens external link in overlay
// Both empty row   → skipped
function loadNav() {
  var promise;
  if (window.electronAPI && window.electronAPI.loadNav) {
    promise = window.electronAPI.loadNav();
  } else if (APPS_SCRIPT_URL) {
    promise = fetch(APPS_SCRIPT_URL + '?action=getNav' + (SHEET_ID ? '&sheetId=' + encodeURIComponent(SHEET_ID) : '')).then(function(r) { return r.json(); });
  } else {
    return;
  }
  promise
    .then(function(result) {
      if (result.success && result.nav && result.nav.length) {
        NAV_ITEMS = result.nav;
        renderNav();
      }
    })
    .catch(function() {});
}

function renderNav() {
  var panel = document.getElementById('panelNavItems');
  panel.innerHTML = '';

  NAV_ITEMS.forEach(function(item) {
    if (item.accessRequired) {
      var hasAccess = UNLOCKED['all'] || UNLOCKED[item.accessRequired];
      if (!hasAccess) return;
    }
    var btn = document.createElement('button');
    if (item.url) {
      btn.className = 'panel-btn';
      btn.innerHTML = (item.label || 'Link') + ' &#8599;';
      btn.onclick = function() { closeSidePanel(); openOverlay(item.url, item.label); };
    } else {
      var cat = item.category;
      btn.className = 'panel-btn' + (currentFilter === cat ? ' active' : '');
      btn.textContent = item.label || item.category;
      btn.onclick = function() { closeSidePanel(); filterCategory(cat); };
    }
    panel.appendChild(btn);
  });

  // Highlight hamburger if a panel category is active
  var panelActive = NAV_ITEMS.some(function(item) { return item.category === currentFilter; });
  var hb = document.getElementById('hamburgerBtn');
  if (hb) {
    if (panelActive || currentFilter === 'board') hb.classList.add('has-active');
    else hb.classList.remove('has-active');
  }

  // Community btn highlight
  var cb = document.getElementById('panelCommunityBtn');
  if (cb) cb.className = 'panel-btn' + (currentFilter === 'board' ? ' active' : '');
}

function toggleSidePanel() {
  var panel   = document.getElementById('sidePanel');
  var overlay = document.getElementById('sidePanelOverlay');
  var isOpen  = panel.classList.contains('open');
  if (isOpen) { closeSidePanel(); } else { panel.classList.add('open'); overlay.classList.add('open'); }
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  document.getElementById('sidePanelOverlay').classList.remove('open');
}

function panelOpenBoard() {
  closeSidePanel();
  currentFilter = 'board';
  renderNav();
  openBoard();
}

// ━━━ PRODUCTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadProducts() {
  if (window.electronAPI && window.electronAPI.loadProducts) {
    window.electronAPI.loadProducts().then(function(result) {
      PRODUCTS = (result.success && result.products && result.products.length)
        ? result.products.map(normalizeProduct) : getSampleProducts();
      renderStore();
    }).catch(function() { PRODUCTS = getSampleProducts(); renderStore(); });
    return;
  }
  if (!SHEET_ID) { PRODUCTS = getSampleProducts(); renderStore(); return; }

  var cbName = 'storeCallback_' + Date.now();
  window[cbName] = function(resp) {
    delete window[cbName];
    try { parseSheetData(resp); renderStore(); }
    catch(e) { PRODUCTS = getSampleProducts(); renderStore(); }
  };
  var script = document.createElement('script');
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=' + SHEET_NAME + '&_t=' + Date.now();
  script.src = url + '&tqx=responseHandler:' + cbName;
  script.onerror = function() {
    fetch(url).then(function(r) { return r.text(); })
      .then(function(t) {
        parseSheetData(JSON.parse(t.replace(/.*google\.visualization\.Query\.setResponse\(/, '').replace(/\);?\s*$/, '')));
        renderStore();
      }).catch(function() { PRODUCTS = getSampleProducts(); renderStore(); });
  };
  document.body.appendChild(script);
}

function normalizeProduct(p) {
  var rawTags = p.tags || p.tag || '';
  var hv = p.hidden !== undefined ? p.hidden : '';
  return {
    id: p.id || p.product_id || '',
    title: p.title || '',
    description: p.description || p.desc || '',
    category: (p.category || '').toLowerCase(),
    price: p.price || '',
    image: p.image || p.image_url || '',
    generatorUrl: p.generatorUrl || p.generator_url || p.url || '',
    featured: (function(v){ v = v !== undefined ? v : (p.is_featured !== undefined ? p.is_featured : ''); return v === true || v === 1 || String(v).toLowerCase() === 'true' || String(v) === '1'; })(p.featured),
    accessType: (p.accessType || p.access_type || 'free').toLowerCase(),
    purchaseUrl: p.purchaseUrl || p.purchase_url || '',
    tags: Array.isArray(rawTags) ? rawTags : String(rawTags).split(',').map(function(t) { return t.trim(); }).filter(Boolean),
    hidden: hv === true || hv === 1 || String(hv).toLowerCase() === 'true' || String(hv) === '1',
    private: (function(v){ return v === true || v === 1 || String(v).toLowerCase() === 'true' || String(v) === '1'; })(p.private !== undefined ? p.private : '')
  };
}

function parseSheetData(json) {
  PRODUCTS = [];
  json.table.rows.forEach(function(row) {
    var get = function(i) { var c = row.c[i]; return c && c.v != null ? String(c.v) : ''; };
    PRODUCTS.push({
      id: get(0), title: get(1), description: get(2),
      category: get(3).toLowerCase(), price: get(4), image: get(5),
      generatorUrl: get(6),
      tags: get(7).split(',').map(function(t){return t.trim();}).filter(Boolean),
      featured: get(8).toLowerCase()==='true'||get(8)==='1'||get(8)===1,
      accessType: get(9).toLowerCase()||'free',
      purchaseUrl: get(10),
      hidden: get(11).toLowerCase()==='true'||get(11)==='1',
      private: get(12).toLowerCase()==='true'||get(12)==='1'
    });
  });
}

function getSampleProducts() {
  return [];
}

// ━━━ BUNDLES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var BUNDLES = {};
function loadBundles() {
  if (!SHEET_ID) return;
  var cbName = 'bundleCallback_' + Date.now();
  window[cbName] = function(resp) {
    delete window[cbName];
    try {
      var cols = resp.table.cols, rows = resp.table.rows;
      var idxId = -1, idxPids = -1;
      cols.forEach(function(c,i){var l=(c.label||'').toLowerCase().trim();if(l==='bundle_id')idxId=i;if(l==='product_ids')idxPids=i;});
      if (idxId===-1) idxId=0;
      if (idxPids===-1) idxPids=4;
      rows.forEach(function(row){
        var get=function(i){var c=row.c[i];return c&&c.v!=null?String(c.v):'';};
        var bid=get(idxId).toLowerCase().trim(), pids=get(idxPids).toLowerCase().trim();
        if(bid&&pids) BUNDLES[bid]=pids.split(',').map(function(p){return p.trim();}).filter(Boolean);
      });
    } catch(e){}
  };
  var script = document.createElement('script');
  script.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Bundles&_t=' + Date.now() + '&tqx=responseHandler:' + cbName;
  document.body.appendChild(script);
}

// ━━━ RENDER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStore() {
  document.getElementById('loadingState').style.display = 'none';

  var visible = PRODUCTS.filter(function(p) { return !p.hidden || UNLOCKED[p.id] || UNLOCKED['all']; });
  var featured = visible.filter(function(p) { return p.featured && !p.private; });
  var filtered;

  if (currentFilter === 'favorites') {
    filtered = visible.filter(function(p) { return FAVORITES.indexOf(p.id) !== -1; });
  } else if (currentFilter === 'library') {
    filtered = visible.filter(function(p) { return p.accessType==='free'||UNLOCKED[p.id]||UNLOCKED['all']; });
  } else if (currentFilter === 'all') {
    filtered = visible.filter(function(p) { return !p.private; });
  } else {
    filtered = visible.filter(function(p) { return p.category === currentFilter; });
  }

  var fs = document.getElementById('featuredSection');
  if (featured.length > 0 && currentFilter === 'all') {
    fs.style.display = 'block';
    document.getElementById('featuredGrid').innerHTML = featured.map(buildCard).join('');
  } else {
    fs.style.display = 'none';
  }

  var emptyMsg = currentFilter === 'favorites'
    ? 'No favorites yet — click the ♡ on any product to save it.'
    : currentFilter === 'library'
    ? 'Your library is empty — sign in or purchase a product to see it here.'
    : 'No products in this category yet.';

  document.getElementById('productGrid').innerHTML = filtered.length
    ? filtered.map(buildCard).join('')
    : '<p style="color:var(--muted);font-size:13px;">' + emptyMsg + '</p>';
}

function buildCard(p) {
  var isUnlocked = p.accessType === 'free' || UNLOCKED[p.id] || UNLOCKED['all'];
  var priceClass = (!p.price || p.price==='Free'||p.price==='0') ? 'free' : '';
  var displayPrice = (!p.price || p.price==='Free'||p.price==='0') ? 'Free' : p.price;

  var imageHTML = p.image
    ? '<img class="card-image" src="'+p.image+'" alt="'+p.title+'" loading="lazy">'
    : '<div class="card-image-placeholder">&#128302;</div>';

  var tagsHTML = p.tags.map(function(t) {
    var cls = t==='featured'?'tag-featured':t==='premium'?'tag-premium':t==='new'?'tag-new':'tag-featured';
    return '<span class="tag '+cls+'">'+t+'</span>';
  }).join('');

  var isFav = FAVORITES.indexOf(p.id) !== -1;
  var favBtn = '<button class="card-fav'+(isFav?' active':'')+'" onclick="event.stopPropagation();toggleFavorite(\''+p.id+'\')">'+(isFav?'&#9829;':'&#9825;')+'</button>';

  var lockOverlay = '';
  if (!isUnlocked && p.accessType === 'paid') {
    var buyBtn = p.purchaseUrl
      ? '<button class="btn-buy" onclick="event.stopPropagation();openOverlay(\''+p.purchaseUrl+'\',\'Purchase: '+p.title.replace(/'/g,'')+'\')">Purchase Now</button>'
      : '';
    lockOverlay = '<div class="card-locked"><span class="lock-icon">&#128274;</span><span class="lock-label">'+displayPrice+'</span>'+buyBtn+'</div>';
  }

  return '<div class="product-card" onclick="handleCardClick(\''+p.id+'\')">'
    + favBtn + imageHTML
    + '<div class="card-body">'
    + '<div class="card-title">'+p.title+'</div>'
    + '<div class="card-desc">'+p.description+'</div>'
    + '<div class="card-footer"><span class="card-price '+priceClass+'">'+displayPrice+'</span><div class="card-tags">'+tagsHTML+'</div></div>'
    + '</div>' + lockOverlay + '</div>';
}

// ━━━ FAVORITES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleFavorite(id) {
  var idx = FAVORITES.indexOf(id);
  if (idx===-1) FAVORITES.push(id); else FAVORITES.splice(idx,1);
  localStorage.setItem(FAV_KEY, JSON.stringify(FAVORITES));
  renderStore();
}

// ━━━ FILTERING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function filterCategory(cat) {
  currentFilter = cat;
  document.getElementById('boardSection').style.display = 'none';
  document.querySelector('.store-section').style.display = '';
  // Highlight correct top bar btn
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  var topBtn = document.querySelector('.nav-bar .nav-btn[onclick="filterCategory(\''+cat+'\')"]');
  if (topBtn) topBtn.classList.add('active');
  renderNav();
  renderStore();
}

// ━━━ CARD CLICK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handleCardClick(id) {
  var p = PRODUCTS.find(function(x){return x.id===id;});
  if (!p) return;

  if (p.category === 'bundles') {
    if (p.accessType==='paid' && !UNLOCKED[id] && !UNLOCKED['all']) {
      if (p.purchaseUrl) openOverlay(p.purchaseUrl, 'Purchase: '+p.title);
      else showToast('Purchase this bundle to unlock everything inside');
      return;
    }
    var pids = (p.generatorUrl||'').split(',').map(function(x){return x.trim().toLowerCase();}).filter(Boolean);
    openBundlePicker(id, p.title, p.description, pids, p.accessType);
    return;
  }

  if (p.accessType==='paid' && !UNLOCKED[id] && !UNLOCKED['all']) {
    if (p.purchaseUrl) { openOverlay(p.purchaseUrl, 'Purchase: '+p.title); return; }
    if (!USER_EMAIL) { pendingProduct=id; openLoginModal(); return; }
    showToast('You haven\'t purchased this yet');
    return;
  }

  if (p.generatorUrl) openOverlay(p.generatorUrl, p.title);
  else showToast('Generator URL not configured yet');
}

function openExternal(url) {
  if (window.electronAPI && window.electronAPI.openExternal) {
    window.electronAPI.openExternal(url);
  } else {
    window.open(url, '_blank');
  }
}

// ━━━ OVERLAY (generator + purchase + external links) ━━━
function openOverlay(url, title) {
  document.getElementById('iframeTitle').textContent = title || '';
  document.getElementById('generatorFrame').src = url;
  document.getElementById('iframeOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeOverlay() {
  var wv = document.getElementById('generatorFrame');
  wv.src = 'about:blank';
  setTimeout(function() { wv.src = ''; }, 50);
  document.getElementById('iframeOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ━━━ BUNDLE PICKER ━━━━━━━━━━━━━━━━━━━━━━━━━━
function openBundlePicker(bundleId, title, desc, productIds, accessType) {
  document.getElementById('bundlePickerTitle').textContent = title;
  document.getElementById('bundlePickerSub').textContent = desc || 'Choose a product to open';
  document.getElementById('bundlePicker').classList.add('open');
  var list = document.getElementById('bundlePickerList');
  if (!productIds || !productIds.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;">No products configured in this bundle.</p>'; return;
  }
  list.innerHTML = productIds.map(function(pid) {
    var p = PRODUCTS.find(function(x){return x.id.toLowerCase()===pid;});
    if (!p) return '<div class="bundle-item" style="opacity:.4"><div><div class="bundle-item-title">'+pid+'</div><div class="bundle-item-desc">Not found — check product ID</div></div></div>';
    var access = UNLOCKED[pid]||UNLOCKED[bundleId.toLowerCase()]||UNLOCKED['all']||accessType==='free'||p.accessType==='free';
    var btn = access
      ? '<button class="btn-launch" onclick="launchBundleItem(\''+pid+'\')">Launch</button>'
      : '<button class="btn-launch" style="background:var(--muted);cursor:default" disabled>Locked</button>';
    return '<div class="bundle-item'+(access?'':' bundle-item-locked')+'"><div><div class="bundle-item-title">'+p.title+'</div><div class="bundle-item-desc">'+(p.description||'')+'</div></div>'+btn+'</div>';
  }).join('');
}
function closeBundlePicker() { document.getElementById('bundlePicker').classList.remove('open'); }
function launchBundleItem(pid) {
  var p = PRODUCTS.find(function(x){return x.id.toLowerCase()===pid;});
  if (p && p.generatorUrl) { closeBundlePicker(); openOverlay(p.generatorUrl, p.title); }
  else showToast('URL not configured for this product');
}

// ━━━ EMAIL LOGIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderLoginBar() {
  var bar = document.getElementById('loginBar');
  if (USER_EMAIL) {
    bar.innerHTML = '<span class="user-email">Signed in as '+USER_EMAIL+'</span>'
      +'<button class="logout-btn" onclick="logout()">Sign Out</button>';
  } else {
    bar.innerHTML = '<input type="email" id="topEmailInput" placeholder="Enter your purchase email" autocomplete="email">'
      +'<button onclick="loginFromBar()">Sign In</button>';
  }
}

function openLoginModal() {
  document.getElementById('loginEmailInput').value='';
  document.getElementById('loginEmailInput').classList.remove('error');
  document.getElementById('loginModal').classList.add('open');
  setTimeout(function(){document.getElementById('loginEmailInput').focus();},100);
}
function closeLoginModal() { document.getElementById('loginModal').classList.remove('open'); pendingProduct=null; }
function loginFromBar() {
  var el=document.getElementById('topEmailInput');
  var email=el?el.value.trim().toLowerCase():'';
  if(!email||email.indexOf('@')===-1){showToast('Enter a valid email');return;}
  doLogin(email);
}
function submitLogin() {
  var email=document.getElementById('loginEmailInput').value.trim().toLowerCase();
  if(!email||email.indexOf('@')===-1){document.getElementById('loginEmailInput').classList.add('error');return;}
  doLogin(email);
}

function doLogin(email, silent) {
  if(!silent) showToast('Checking access...');
  var handler = window.electronAPI
    ? window.electronAPI.checkAccess(email)
    : fetch(APPS_SCRIPT_URL+'?action=check&email='+encodeURIComponent(email)+'&sheetId='+encodeURIComponent(SHEET_ID)).then(function(r){return r.json();});

  handler.then(function(result) {
    USER_EMAIL = email;
    localStorage.setItem(EMAIL_KEY, email);
    UNLOCKED = {};
    if (result.success && result.products) {
      result.products.forEach(function(pid){UNLOCKED[pid]=true;});
      if (result.allAccess) UNLOCKED['all'] = true;
      if(!silent) showToast('Welcome! '+result.products.length+' product'+(result.products.length===1?'':'s')+' unlocked');
    } else {
      if(!silent) showToast('Signed in — no purchases found yet');
    }
    closeLoginModal();
    renderLoginBar();
    renderNav();
    renderStore();
    if (pendingProduct && (UNLOCKED[pendingProduct]||UNLOCKED['all'])) {
      var p=PRODUCTS.find(function(x){return x.id===pendingProduct;});
      if(p&&p.generatorUrl) setTimeout(function(){openOverlay(p.generatorUrl,p.title);},600);
      pendingProduct=null;
    }
  }).catch(function(){if(!silent)showToast('Could not connect — try again');});
}

function logout() {
  USER_EMAIL=''; UNLOCKED={};
  localStorage.removeItem(EMAIL_KEY);
  renderLoginBar(); renderNav(); renderStore();
  showToast('Signed out');
}

// ━━━ MESSAGE BOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━
var CURRENT_BOARD = 'public';
var BOARD_OWNER_EMAIL = '';

function openBoard() {
  document.getElementById('boardSection').style.display = 'block';
  document.getElementById('showcaseSection').style.display = 'none';
  document.querySelector('.store-section').style.display = 'none';
  document.getElementById('featuredSection').style.display = 'none';
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  renderNav();
  buildBoardTabs();
  loadBoard(CURRENT_BOARD);
}

function closeBoard() {
  currentFilter = 'all';
  document.getElementById('boardSection').style.display = 'none';
  document.querySelector('.store-section').style.display = '';
  renderNav();
  renderStore();
}

function buildBoardTabs() {
  var tabs = [{ id: 'public', label: '🌐 Public' }];
  if (USER_EMAIL && Object.keys(UNLOCKED).length > 0) {
    tabs.push({ id: 'buyers', label: '🛒 Buyers' });
  }
  NAV_ITEMS.forEach(function(item) {
    if (!item.accessRequired) return;
    var hasAccess = UNLOCKED['all'] || UNLOCKED[item.accessRequired];
    if (hasAccess && item.category) {
      tabs.push({ id: item.category, label: '🔒 ' + item.label });
    }
  });

  var html = tabs.map(function(t) {
    return '<button class="board-tab' + (CURRENT_BOARD === t.id ? ' active' : '') +
      '" onclick="switchBoard(\'' + t.id + '\')">' + t.label + '</button>';
  }).join('');
  document.getElementById('boardTabs').innerHTML = html;

  // Show/hide compose based on board access
  var canPost = CURRENT_BOARD === 'public' || USER_EMAIL;
  document.getElementById('boardCompose').style.display = canPost ? 'block' : 'none';
  var notice = document.getElementById('boardLoginNotice');
  notice.style.display = (!USER_EMAIL && CURRENT_BOARD !== 'public') ? 'block' : 'none';

  // Pre-fill name if signed in
  if (USER_EMAIL) {
    var nameEl = document.getElementById('boardName');
    if (!nameEl.value) nameEl.value = USER_EMAIL.split('@')[0];
  }
}

function switchBoard(boardId) {
  CURRENT_BOARD = boardId;
  buildBoardTabs();
  loadBoard(boardId);
}

function loadBoard(boardId) {
  document.getElementById('boardMessages').innerHTML = '<p class="board-empty">Loading...</p>';
  var url, promise;
  if (window.electronAPI && window.electronAPI.loadMessages) {
    promise = window.electronAPI.loadMessages(boardId);
  } else {
    url = APPS_SCRIPT_URL + '?action=getMessages&board=' + encodeURIComponent(boardId) + '&sheetId=' + encodeURIComponent(SHEET_ID);
    promise = fetch(url).then(function(r) { return r.json(); });
  }
  promise.then(function(result) {
    if (!result.success || !result.messages.length) {
      document.getElementById('boardMessages').innerHTML = '<p class="board-empty">No messages yet — be the first to post!</p>';
      return;
    }
    document.getElementById('boardMessages').innerHTML = result.messages.map(function(m) {
      var ts = m.timestamp ? new Date(m.timestamp).toLocaleString() : '';
      var delBtn = '<button class="btn-delete-msg" onclick="deletePost(\'' + m.id + '\')" title="Delete">✕</button>';
      return '<div class="board-msg" id="msg-' + m.id + '">' +
        '<div class="board-msg-header">' +
          '<span class="board-msg-name">' + escHtml(m.name || 'Anonymous') + '</span>' +
          '<span style="display:flex;align-items:center;gap:8px;">' +
            '<span class="board-msg-time">' + ts + '</span>' +
            delBtn +
          '</span>' +
        '</div>' +
        '<div class="board-msg-text">' + escHtml(m.message) + '</div>' +
      '</div>';
    }).join('');
  }).catch(function() {
    document.getElementById('boardMessages').innerHTML = '<p class="board-empty">Could not load messages.</p>';
  });
}

function submitPost() {
  var name    = document.getElementById('boardName').value.trim() || 'Anonymous';
  var message = document.getElementById('boardMessage').value.trim();
  if (!message) { showToast('Please write a message first'); return; }

  var promise;
  if (window.electronAPI && window.electronAPI.postMessage) {
    promise = window.electronAPI.postMessage(CURRENT_BOARD, name, USER_EMAIL, message);
  } else {
    var url = APPS_SCRIPT_URL + '?action=postMessage&board=' + encodeURIComponent(CURRENT_BOARD) +
      '&name=' + encodeURIComponent(name) + '&email=' + encodeURIComponent(USER_EMAIL || '') +
      '&message=' + encodeURIComponent(message) + '&sheetId=' + encodeURIComponent(SHEET_ID);
    promise = fetch(url).then(function(r) { return r.json(); });
  }
  promise.then(function(result) {
    if (result.success) {
      document.getElementById('boardMessage').value = '';
      showToast('Posted!');
      loadBoard(CURRENT_BOARD);
    } else {
      showToast('Could not post — try again');
    }
  }).catch(function() { showToast('Could not post — try again'); });
}

function deletePost(msgId) {
  var promise;
  if (window.electronAPI && window.electronAPI.deleteMessage) {
    promise = window.electronAPI.deleteMessage(msgId);
  } else {
    var url = APPS_SCRIPT_URL + '?action=deleteMessage&msgId=' + encodeURIComponent(msgId) + '&sheetId=' + encodeURIComponent(SHEET_ID);
    promise = fetch(url).then(function(r) { return r.json(); });
  }
  promise.then(function(result) {
    if (result.success) {
      var el = document.getElementById('msg-' + msgId);
      if (el) el.remove();
      showToast('Deleted');
    } else {
      showToast('Could not delete');
    }
  }).catch(function() { showToast('Could not delete'); });
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ━━━ REFRESH ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function refreshStore() {
  showToast('Refreshing...');
  loadSettings(function(){loadNav();loadProducts();loadBundles();});
  if(USER_EMAIL) doLogin(USER_EMAIL,true);
}

// ━━━ TOAST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _toastTimer;
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},2400);
}

// ━━━ KEYBOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') {
    if(document.getElementById('iframeOverlay').classList.contains('open')) closeOverlay();
    if(document.getElementById('loginModal').classList.contains('open')) closeLoginModal();
    if(document.getElementById('bundlePicker').classList.contains('open')) closeBundlePicker();
  }
  if(e.key==='Enter'&&document.getElementById('loginModal').classList.contains('open')) submitLogin();
  if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='topEmailInput') loginFromBar();
});

// ━━━ BG ANIMATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function(){
  var c=document.getElementById('bgCanvas'),x=c.getContext('2d'),W,H,motes=[];
  function rnd(a,b){return a+Math.random()*(b-a);}
  function getColor(type){
    var s=getComputedStyle(document.documentElement);
    return type==='p'?s.getPropertyValue('--primary').trim():s.getPropertyValue('--secondary').trim();
  }
  function hexToRgbArr(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');var n=parseInt(hex,16);return isNaN(n)?[106,0,255]:[(n>>16)&255,(n>>8)&255,n&255];}
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight;init();}
  function init(){
    motes=[];
    var n=Math.max(20,Math.floor(W/35));
    for(var i=0;i<n;i++) motes.push({x:rnd(0,W),y:rnd(0,H),r:rnd(0.3,1.4),vy:rnd(-0.05,0.03),vx:rnd(-0.03,0.03),tw:rnd(0,6.28),ts:rnd(0.004,0.014),type:Math.random()<0.5?'p':'s'});
  }
  function frame(){
    x.clearRect(0,0,W,H);
    var g=x.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,Math.min(W,H)*0.5);
    g.addColorStop(0,'rgba(106,0,255,0.04)'); g.addColorStop(1,'transparent');
    x.fillStyle=g; x.fillRect(0,0,W,H);
    for(var i=0;i<motes.length;i++){
      var m=motes[i];
      m.y+=m.vy; m.x+=m.vx+Math.sin(m.tw)*0.05; m.tw+=m.ts;
      if(m.y<-4)m.y=H+4; if(m.y>H+4)m.y=-4; if(m.x<-4)m.x=W+4; if(m.x>W+4)m.x=-4;
      var a=0.15+0.45*Math.abs(Math.sin(m.tw));
      var col=hexToRgbArr(getColor(m.type));
      x.beginPath(); x.arc(m.x,m.y,m.r,0,6.28);
      x.shadowColor='rgba('+col.join(',')+',0.5)'; x.fillStyle='rgba('+col.join(',')+','+(0.4*a)+')';
      x.shadowBlur=6; x.fill();
    }
    requestAnimationFrame(frame);
  }
  addEventListener('resize',resize);
  resize(); frame();
})();

// ━━━ BOOT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
boot();
</script>

<script>
/* ═══════════════════════════════════════════════
   PHOTO-CUBE — Draggable 3D Web Component
   ═══════════════════════════════════════════════ */
(function(){
  var FACES=[
    {name:'front', css:'translateZ({h}px)',                normal:[0,0,1]},
    {name:'back',  css:'rotateY(180deg) translateZ({h}px)',normal:[0,0,-1]},
    {name:'left',  css:'rotateY(-90deg) translateZ({h}px)',normal:[-1,0,0]},
    {name:'right', css:'rotateY(90deg) translateZ({h}px)', normal:[1,0,0]},
    {name:'top',   css:'rotateX(90deg) translateZ({h}px)', normal:[0,-1,0]},
    {name:'bottom',css:'rotateX(-90deg) translateZ({h}px)',normal:[0,1,0]},
  ];
  function frontFace(rx,ry,urls){
    var rxr=rx*Math.PI/180,ryr=ry*Math.PI/180,best=null,bestZ=-Infinity;
    FACES.forEach(function(f){var nx=f.normal[0],ny=f.normal[1],nz=f.normal[2],nz2=-Math.sin(ryr)*nx+Math.cos(ryr)*nz,nz3=Math.sin(rxr)*ny+Math.cos(rxr)*nz2;if(nz3>bestZ){bestZ=nz3;best=f.name;}});
    return best&&urls[best]?urls[best]:null;
  }
  var ov=null;
  function getOv(){
    if(ov)return ov;
    ov=document.createElement('div');
    ov.style.cssText='display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;cursor:zoom-out;';
    var img=document.createElement('img');
    img.style.cssText='max-width:90vw;max-height:90vh;border-radius:12px;border:2px solid var(--primary);box-shadow:0 0 60px var(--p-glow);';
    ov.appendChild(img);
    ov.addEventListener('click',function(){ov.style.display='none';});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')ov.style.display='none';});
    document.body.appendChild(ov);
    return ov;
  }
  if(customElements.get('photo-cube'))return;
  customElements.define('photo-cube',class extends HTMLElement{
    connectedCallback(){
      var self=this;
      self._size=parseInt(self.getAttribute('size'))||260;
      self._speed=parseFloat(self.getAttribute('speed'))||1;
      self._urls={};
      FACES.forEach(function(f){var v=self.getAttribute(f.name);if(v&&v!=='YOUR_PHOTO_URL_HERE')self._urls[f.name]=v;});
      self._build();
    }
    _build(){
      var self=this,sz=self._size,h=sz/2,BASE=0.15/self._speed,urls=self._urls;
      var st=document.createElement('style');
      st.textContent=
        '.pc-wrap{display:inline-block;}'
        +'.pc-scene{width:'+sz+'px;height:'+sz+'px;perspective:900px;margin:0 auto;cursor:grab;user-select:none;-webkit-user-select:none;}'
        +'.pc-scene:active{cursor:grabbing;}'
        +'.pc-cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;}'
        +'.pc-face{position:absolute;width:'+sz+'px;height:'+sz+'px;background-size:cover;background-position:center;border:2px solid var(--primary);box-shadow:inset 0 0 20px rgba(0,0,0,0.4);cursor:pointer;transition:box-shadow .2s;background-color:rgba(10,0,30,0.8);}'
        +'.pc-face:hover{box-shadow:inset 0 0 0 3px var(--secondary),0 0 30px var(--s-glow);}'
        +'.pc-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.2);font-size:11px;font-family:monospace;text-align:center;padding:12px;}';
      self.appendChild(st);
      var wrap=document.createElement('div');wrap.className='pc-wrap';
      var scene=document.createElement('div');scene.className='pc-scene';
      var cube=document.createElement('div');cube.className='pc-cube';
      FACES.forEach(function(f){
        var el=document.createElement('div');el.className='pc-face';
        el.style.transform=f.css.replace(/\{h\}/g,h);
        if(urls[f.name])el.style.backgroundImage='url('+urls[f.name]+')';
        else el.innerHTML='<div class="pc-ph">📸<br>'+f.name.toUpperCase()+'<br>add image url</div>';
        cube.appendChild(el);
      });
      scene.appendChild(cube);wrap.appendChild(scene);self.appendChild(wrap);
      var rx=-20,ry=0,vx=0,vy=BASE,drag=false,dragged=false,sx,sy,lx,ly;
      (function loop(){
        if(!drag){vy+=(BASE-vy)*0.03;vx+=(0-vx)*0.03;ry+=vy;rx+=vx;}
        cube.style.transform='rotateX('+rx+'deg) rotateY('+ry+'deg)';
        requestAnimationFrame(loop);
      })();
      scene.addEventListener('mousedown',function(e){drag=true;dragged=false;vx=0;vy=0;sx=lx=e.clientX;sy=ly=e.clientY;});
      window.addEventListener('mousemove',function(e){if(!drag)return;var dx=e.clientX-lx,dy=e.clientY-ly;if(Math.hypot(e.clientX-sx,e.clientY-sy)>8)dragged=true;ry+=dx*0.4;rx+=dy*0.4;vy=dx*0.4;vx=dy*0.4;lx=e.clientX;ly=e.clientY;});
      window.addEventListener('mouseup',function(){drag=false;});
      scene.addEventListener('touchstart',function(e){drag=true;dragged=false;vx=0;vy=0;sx=lx=e.touches[0].clientX;sy=ly=e.touches[0].clientY;},{passive:true});
      scene.addEventListener('touchmove',function(e){if(!drag)return;var dx=e.touches[0].clientX-lx,dy=e.touches[0].clientY-ly;if(Math.hypot(e.touches[0].clientX-sx,e.touches[0].clientY-sy)>8)dragged=true;ry+=dx*0.4;rx+=dy*0.4;vy=dx*0.4;vx=dy*0.4;lx=e.touches[0].clientX;ly=e.touches[0].clientY;e.preventDefault();},{passive:false});
      scene.addEventListener('touchend',function(){drag=false;});
      scene.addEventListener('click',function(){if(dragged)return;var u=frontFace(rx,ry,urls);if(u){var o=getOv();o.querySelector('img').src=u;o.style.display='flex';}});
    }
  });
})();
</script>

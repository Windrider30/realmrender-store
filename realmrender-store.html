<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealmRender — Render Your Reality</title>
<style>
:root {
  --void: #0D0D0D;
  --void-light: #141414;
  --void-card: #1a1a1f;
  --arcane: #6A00FF;
  --arcane-dim: rgba(106,0,255,0.15);
  --arcane-glow: rgba(106,0,255,0.4);
  --cyan: #00F0FF;
  --cyan-dim: rgba(0,240,255,0.12);
  --cyan-glow: rgba(0,240,255,0.35);
  --magenta: #FF2E88;
  --blue: #3A86FF;
  --ash: #B0B0B0;
  --ink: #E8E8F0;
  --muted: #777788;
  --line: rgba(106,0,255,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100vh; background: var(--void); color: var(--ink); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow-x: hidden; }

/* ── BG CANVAS ── */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-vignette { position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(50% 40% at 50% 30%, rgba(106,0,255,0.08), transparent 60%),
              radial-gradient(40% 35% at 80% 60%, rgba(0,240,255,0.05), transparent 55%),
              linear-gradient(180deg, rgba(13,13,13,0.3), rgba(13,13,13,0.95)); }

/* ── TOPBAR ── */
.topbar { position: relative; z-index: 10; text-align: center; padding: 36px 20px 8px; }
.topbar h1 { font-size: 38px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
  background: linear-gradient(90deg, var(--arcane), var(--cyan), var(--magenta), var(--arcane));
  background-size: 300%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  animation: brandPulse 10s ease-in-out infinite; }
@keyframes brandPulse { 0%,100% { background-position: 0% } 50% { background-position: 300% } }
.topbar .tagline { color: var(--ash); font-size: 12px; letter-spacing: 4px; text-transform: uppercase; margin-top: 6px; }

/* ── NAV ── */
.nav-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 8px; padding: 16px 20px; flex-wrap: wrap; }
.nav-btn { padding: 9px 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border: 1px solid var(--line); border-radius: 30px; background: transparent; color: var(--muted); cursor: pointer; transition: .2s; }
.nav-btn:hover, .nav-btn.active { color: var(--void); background: linear-gradient(135deg, var(--arcane), var(--cyan));
  border-color: transparent; box-shadow: 0 0 20px var(--arcane-glow); }

/* ── PRODUCT GRID ── */
.store-section { position: relative; z-index: 10; max-width: 1280px; margin: 0 auto; padding: 20px 24px 60px; }
.section-title { font-size: 14px; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); margin-bottom: 18px; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

/* ── PRODUCT CARD ── */
.product-card { background: var(--void-card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
  cursor: pointer; transition: .25s; position: relative; }
.product-card:hover { transform: translateY(-4px); border-color: var(--arcane); box-shadow: 0 12px 40px rgba(106,0,255,0.25); }
.card-image { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #111; }
.card-image-placeholder { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #111, #1a1a2e); font-size: 48px; }
.card-body { padding: 14px 16px 16px; }
.card-title { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-price { font-size: 16px; font-weight: 900;
  background: linear-gradient(90deg, var(--cyan), var(--arcane)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card-price.free { background: linear-gradient(90deg, #00ff88, var(--cyan)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { font-size: 9px; padding: 3px 8px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
.tag-featured { background: var(--arcane-dim); color: var(--arcane); border: 1px solid rgba(106,0,255,0.3); }
.tag-premium { background: var(--cyan-dim); color: var(--cyan); border: 1px solid rgba(0,240,255,0.3); }
.tag-new { background: rgba(255,46,136,0.12); color: var(--magenta); border: 1px solid rgba(255,46,136,0.3); }

/* ── FAVORITE BUTTON ── */
.card-fav { position: absolute; top: 10px; right: 10px; z-index: 5; width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(13,13,13,0.7); backdrop-filter: blur(6px); color: var(--muted);
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: .2s; }
.card-fav:hover { background: rgba(106,0,255,0.4); color: #fff; }
.card-fav.active { color: var(--magenta); background: rgba(255,46,136,0.2); }

/* ── LOCKED OVERLAY ── */
.card-locked { position: absolute; inset: 0; background: rgba(13,13,13,0.85); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; border-radius: 16px; opacity: 0; transition: .25s; }
.product-card:hover .card-locked { opacity: 1; }
.card-locked .lock-icon { font-size: 36px; }
.card-locked .lock-label { font-size: 13px; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
.btn-buy { padding: 10px 28px; border: none; border-radius: 30px; font-size: 12px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(135deg, var(--arcane), var(--cyan)); color: var(--void); cursor: pointer; transition: .2s; }
.btn-buy:hover { box-shadow: 0 0 24px var(--cyan-glow); transform: scale(1.05); }

/* ── IFRAME OVERLAY ── */
.iframe-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); }
.iframe-overlay.open { display: flex; flex-direction: column; }
.iframe-topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px;
  background: var(--void-light); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.iframe-title { font-size: 14px; font-weight: 800; letter-spacing: 1px;
  background: linear-gradient(90deg, var(--arcane), var(--cyan)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.iframe-close { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--line); background: transparent;
  color: var(--ink); font-size: 18px; cursor: pointer; transition: .2s; display: flex; align-items: center; justify-content: center; }
.iframe-close:hover { background: var(--magenta); border-color: var(--magenta); color: #fff; }
.iframe-container { flex: 1; }
.iframe-container iframe { width: 100%; height: 100%; border: none; background: var(--void); }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 80px 20px; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--line); border-top-color: var(--arcane);
  border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg) } }
.loading-text { color: var(--muted); font-size: 13px; letter-spacing: 2px; }

/* ── EMAIL LOGIN BAR ── */
.login-bar { position: relative; z-index: 10; display: flex; justify-content: center; gap: 8px; padding: 0 20px 12px; }
.login-bar input { padding: 9px 16px; font-size: 13px; border-radius: 30px; border: 1px solid var(--line);
  background: var(--void-card); color: var(--ink); width: 280px; text-align: center; }
.login-bar input:focus { outline: none; border-color: var(--arcane); box-shadow: 0 0 0 3px var(--arcane-dim); }
.login-bar button { padding: 9px 20px; font-size: 12px; font-weight: 700; border-radius: 30px; border: none;
  background: linear-gradient(135deg, var(--arcane), var(--cyan)); color: var(--void); cursor: pointer; transition: .2s; }
.login-bar button:hover { box-shadow: 0 0 20px var(--arcane-glow); }
.login-bar .logout-btn { background: rgba(255,255,255,0.06); color: var(--ink); border: 1px solid var(--line); }
.login-bar .user-email { color: var(--cyan); font-size: 12px; font-weight: 700; padding: 9px 0; letter-spacing: .5px; }

/* ── MODAL (for non-logged-in clicks) ── */
.modal-overlay { display: none; position: fixed; inset: 0; z-index: 900; background: rgba(0,0,0,0.88);
  align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--void-card); border: 1px solid var(--line); border-radius: 18px; padding: 32px;
  width: 90%; max-width: 420px; text-align: center; }
.modal-box h2 { font-size: 20px; font-weight: 900; margin-bottom: 8px;
  background: linear-gradient(90deg, var(--arcane), var(--cyan)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
.modal-input { width: 100%; padding: 12px 16px; font-size: 14px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--void); color: var(--ink); text-align: center; font-weight: 700; }
.modal-input:focus { outline: none; border-color: var(--arcane); box-shadow: 0 0 0 3px var(--arcane-dim); }
.modal-input.error { border-color: var(--magenta); box-shadow: 0 0 0 3px rgba(255,46,136,0.2); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.modal-actions button { flex: 1; padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; }
.modal-submit { background: linear-gradient(135deg, var(--arcane), var(--cyan)); color: var(--void); }
.modal-cancel { background: rgba(255,255,255,0.06); color: var(--ink); border: 1px solid var(--line) !important; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); z-index: 1100;
  padding: 12px 28px; border-radius: 30px; font-size: 13px; font-weight: 800; color: var(--void);
  background: linear-gradient(135deg, var(--arcane), var(--cyan)); box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  opacity: 0; pointer-events: none; transition: .3s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BUNDLE PICKER ── */
.bundle-picker { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92);
  align-items: center; justify-content: center; }
.bundle-picker.open { display: flex; }
.bundle-picker-box { background: var(--void-card); border: 1px solid var(--line); border-radius: 18px;
  padding: 28px; width: 90%; max-width: 520px; }
.bundle-picker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.bundle-picker-title { font-size: 18px; font-weight: 900; letter-spacing: 1px;
  background: linear-gradient(90deg, var(--arcane), var(--cyan)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.bundle-picker-close { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--line);
  background: transparent; color: var(--ink); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.bundle-picker-close:hover { background: var(--magenta); border-color: var(--magenta); }
.bundle-picker-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.bundle-item { display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 10px;
  background: rgba(255,255,255,0.02); }
.bundle-item-title { font-size: 14px; font-weight: 700; }
.bundle-item-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.btn-launch { padding: 8px 20px; border: none; border-radius: 30px; font-size: 11px; font-weight: 800;
  letter-spacing: 1px; background: linear-gradient(135deg, var(--arcane), var(--cyan));
  color: var(--void); cursor: pointer; white-space: nowrap; transition: .2s; }
.btn-launch:hover { box-shadow: 0 0 18px var(--cyan-glow); transform: scale(1.04); }
.bundle-item-locked { opacity: 0.4; }

/* ── SHOWCASE CUBE ── */
.showcase-section { position: relative; z-index: 10; text-align: center; padding: 10px 20px 36px; }
.showcase-label { font-size: 10px; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--cyan); margin-bottom: 6px; }
.showcase-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--arcane), var(--cyan)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.showcase-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; letter-spacing: .5px; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .topbar h1 { font-size: 24px; letter-spacing: 3px; }
  .product-grid { grid-template-columns: 1fr; }
  .store-section { padding: 16px 14px 40px; }
}
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════════
   REALMRENDER STORE ENGINE
   Reads products from a published Google Sheet
   ═══════════════════════════════════════════════ */

// ━━━ CONFIGURATION ━━━━━━━━━━━━━━━━━━━━━━━━━━━
var _params = new URLSearchParams(window.location.search);
var SHEET_ID = _params.get('sheetId') || '';
var SHEET_NAME = 'Products';
var APPS_SCRIPT_URL = _params.get('appsScriptUrl') || '';

// Google Sheets published JSON endpoint (cache-bust added at load time)
function getSheetURL() {
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=' + SHEET_NAME + '&_t=' + Date.now();
}

// ━━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var PRODUCTS = [];
var BUNDLES = {};
var UNLOCKED = {};
var USER_EMAIL = localStorage.getItem('rr_email') || '';
var currentFilter = 'all';
var pendingProduct = null;
var FAVORITES = JSON.parse(localStorage.getItem('rr_favorites') || '[]');

// ━━━ LOAD FROM GOOGLE SHEET ━━━━━━━━━━━━━━━━━━
function loadProducts() {
  // For development/demo: use sample data if no sheet ID set
  if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') {
    PRODUCTS = getSampleProducts();
    renderStore();
    return;
  }

  // JSONP approach — works from any origin including local files
  var cbName = 'rrCallback_' + Date.now();
  window[cbName] = function(resp) {
    delete window[cbName];
    try {
      parseSheetData(resp);
      renderStore();
    } catch(e) {
      console.error('Parse error:', e);
      PRODUCTS = getSampleProducts();
      renderStore();
    }
  };
  var script = document.createElement('script');
  script.src = getSheetURL() + '&tqx=responseHandler:' + cbName;
  script.onerror = function() {
    console.error('JSONP load failed, trying fetch...');
    fetch(getSheetURL())
      .then(function(r) { return r.text(); })
      .then(function(text) {
        var json = JSON.parse(text.replace(/.*google\.visualization\.Query\.setResponse\(/, '').replace(/\);?\s*$/, ''));
        parseSheetData(json);
        renderStore();
      })
      .catch(function(err) {
        console.error('Sheet load error:', err);
        showToast('Could not load products — using demo data');
        PRODUCTS = getSampleProducts();
        renderStore();
      });
  };
  document.body.appendChild(script);
}

function parseSheetData(json) {
  var cols = json.table.cols;
  var rows = json.table.rows;
  PRODUCTS = [];

  rows.forEach(function(row) {
    var get = function(i) {
      var cell = row.c[i];
      return cell && cell.v != null ? String(cell.v) : '';
    };

    PRODUCTS.push({
      id: get(0),
      title: get(1),
      description: get(2),
      category: get(3).toLowerCase(),
      price: get(4),
      image: get(5),
      generatorUrl: get(6),
      tags: get(7).split(',').map(function(t) { return t.trim(); }).filter(Boolean),
      featured: get(8).toLowerCase() === 'true' || get(8) === '1',
      accessType: get(9).toLowerCase() || 'free',
      purchaseUrl: get(10)
    });
  });
}

// ━━━ SAMPLE DATA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getSampleProducts() {
  return [];
}

// ━━━ RENDER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderStore() {
  document.getElementById('loadingState').style.display = 'none';

  var specialView = currentFilter === 'favorites' || currentFilter === 'library';
  var featured = PRODUCTS.filter(function(p) { return p.featured; });
  var filtered;

  if (currentFilter === 'favorites') {
    filtered = PRODUCTS.filter(function(p) { return FAVORITES.indexOf(p.id) !== -1; });
  } else if (currentFilter === 'library') {
    filtered = PRODUCTS.filter(function(p) { return p.accessType === 'free' || UNLOCKED[p.id] || UNLOCKED['all']; });
  } else if (currentFilter === 'all') {
    filtered = PRODUCTS;
  } else {
    filtered = PRODUCTS.filter(function(p) { return p.category === currentFilter; });
  }

  // Featured section — hide for special views
  var fs = document.getElementById('featuredSection');
  var fg = document.getElementById('featuredGrid');
  if (featured.length > 0 && currentFilter === 'all') {
    fs.style.display = 'block';
    fg.innerHTML = featured.map(buildCard).join('');
  } else {
    fs.style.display = 'none';
  }

  var emptyMsg = currentFilter === 'favorites'
    ? 'No favorites yet — click the ♡ on any product to save it.'
    : currentFilter === 'library'
    ? 'Your library is empty — sign in or purchase a product to see it here.'
    : 'No products in this category yet.';

  document.getElementById('productGrid').innerHTML = filtered.length
    ? filtered.map(buildCard).join('')
    : '<p style="color:var(--muted);font-size:13px;">' + emptyMsg + '</p>';
}

function buildCard(p) {
  var isUnlocked = p.accessType === 'free' || UNLOCKED[p.id] || UNLOCKED['all'];
  var priceClass = p.price === 'Free' || p.price === '0' || p.price === '' ? 'free' : '';
  var displayPrice = p.price === 'Free' || p.price === '0' || p.price === '' ? 'Free' : p.price;

  var imageHTML = p.image
    ? '<img class="card-image" src="' + p.image + '" alt="' + p.title + '" loading="lazy">'
    : '<div class="card-image-placeholder">&#128302;</div>';

  var tagsHTML = p.tags.map(function(t) {
    var cls = t === 'featured' ? 'tag-featured' : t === 'premium' ? 'tag-premium' : t === 'new' ? 'tag-new' : 'tag-featured';
    return '<span class="tag ' + cls + '">' + t + '</span>';
  }).join('');

  var lockOverlay = '';
  if (!isUnlocked && p.accessType === 'paid') {
    var buyBtn = p.purchaseUrl
      ? '<button class="btn-buy" onclick="event.stopPropagation();openPurchasePage(\'' + p.purchaseUrl + '\',\'' + p.title + '\')">Purchase Now</button>'
      : '';
    lockOverlay = '<div class="card-locked">' +
      '<span class="lock-icon">&#128274;</span>' +
      '<span class="lock-label">' + p.price + '</span>' +
      buyBtn +
      '</div>';
  }

  var isFav = FAVORITES.indexOf(p.id) !== -1;
  var favBtn = '<button class="card-fav' + (isFav ? ' active' : '') + '" onclick="event.stopPropagation();toggleFavorite(\'' + p.id + '\')" title="' + (isFav ? 'Remove from favorites' : 'Add to favorites') + '">' + (isFav ? '&#9829;' : '&#9825;') + '</button>';

  return '<div class="product-card" onclick="handleCardClick(\'' + p.id + '\')">' +
    favBtn +
    imageHTML +
    '<div class="card-body">' +
      '<div class="card-title">' + p.title + '</div>' +
      '<div class="card-desc">' + p.description + '</div>' +
      '<div class="card-footer">' +
        '<span class="card-price ' + priceClass + '">' + displayPrice + '</span>' +
        '<div class="card-tags">' + tagsHTML + '</div>' +
      '</div>' +
    '</div>' +
    lockOverlay +
  '</div>';
}

// ━━━ FAVORITES ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleFavorite(id) {
  var idx = FAVORITES.indexOf(id);
  if (idx === -1) { FAVORITES.push(id); } else { FAVORITES.splice(idx, 1); }
  localStorage.setItem('rr_favorites', JSON.stringify(FAVORITES));
  renderStore();
}

// ━━━ FILTERING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.querySelector('[onclick="filterCategory(\'' + cat + '\')"]');
  if (btn) btn.classList.add('active');
  renderStore();
}

// ━━━ CARD CLICK → OPEN GENERATOR ━━━━━━━━━━━━
function handleCardClick(id) {
  var product = PRODUCTS.find(function(p) { return p.id === id; });
  if (!product) return;

  // Bundle handling — show picker instead of single iframe
  if (product.category === 'bundles') {
    if (product.accessType === 'paid' && !UNLOCKED[id] && !UNLOCKED['all']) {
      if (product.purchaseUrl) {
        openPurchasePage(product.purchaseUrl, product.title);
      } else {
        showToast('Purchase this bundle to unlock all generators inside');
      }
      return;
    }
    // product_ids stored in generatorUrl field for bundles
    var bundleProductIds = (product.generatorUrl || '').split(',').map(function(p) { return p.trim().toLowerCase(); }).filter(Boolean);
    openBundlePicker(id, product.title, product.description, bundleProductIds, product.accessType);
    return;
  }

  if (product.accessType === 'paid' && !UNLOCKED[id] && !UNLOCKED['all']) {
    if (product.purchaseUrl) {
      openPurchasePage(product.purchaseUrl, product.title);
    } else if (!USER_EMAIL) {
      pendingProduct = id;
      openLoginModal();
    } else {
      showToast('You haven\'t purchased this generator yet');
    }
    return;
  }

  if (product.generatorUrl) {
    openGenerator(product);
  } else {
    showToast('Generator URL not configured yet');
  }
}

function openGenerator(product) {
  var overlay = document.getElementById('iframeOverlay');
  var frame = document.getElementById('generatorFrame');
  document.getElementById('iframeTitle').textContent = product.title;
  frame.src = product.generatorUrl;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGenerator() {
  var overlay = document.getElementById('iframeOverlay');
  var frame = document.getElementById('generatorFrame');
  overlay.classList.remove('open');
  frame.src = '';
  document.body.style.overflow = '';
}

// ━━━ PURCHASE PAGE (in-app) ━━━━━━━━━━━━━━━━━
function openPurchasePage(url, title) {
  var overlay = document.getElementById('iframeOverlay');
  var frame = document.getElementById('generatorFrame');
  document.getElementById('iframeTitle').textContent = 'Purchase: ' + title;
  frame.src = url;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ━━━ EMAIL LOGIN SYSTEM ━━━━━━━━━━━━━━━━━━━━━
function renderLoginBar() {
  var bar = document.getElementById('loginBar');
  if (USER_EMAIL) {
    bar.innerHTML = '<span class="user-email">Signed in as ' + USER_EMAIL + '</span>' +
      '<button class="logout-btn" onclick="logout()">Sign Out</button>';
  } else {
    bar.innerHTML = '<input type="email" id="topEmailInput" placeholder="Enter your purchase email" autocomplete="email">' +
      '<button onclick="loginFromBar()">Sign In</button>';
  }
}

function openLoginModal() {
  document.getElementById('loginEmailInput').value = '';
  document.getElementById('loginEmailInput').classList.remove('error');
  document.getElementById('loginModal').classList.add('open');
  setTimeout(function() { document.getElementById('loginEmailInput').focus(); }, 100);
}

function closeLoginModal() {
  document.getElementById('loginModal').classList.remove('open');
  pendingProduct = null;
}

function loginFromBar() {
  var input = document.getElementById('topEmailInput');
  var email = input ? input.value.trim().toLowerCase() : '';
  if (!email || email.indexOf('@') === -1) {
    showToast('Enter a valid email');
    return;
  }
  doLogin(email);
}

function submitLogin() {
  var email = document.getElementById('loginEmailInput').value.trim().toLowerCase();
  if (!email || email.indexOf('@') === -1) {
    document.getElementById('loginEmailInput').classList.add('error');
    return;
  }
  doLogin(email);
}

function doLogin(email) {
  showToast('Checking access...');

  var handler = window.electronAPI
    ? window.electronAPI.checkAccess(email)
    : fetch(APPS_SCRIPT_URL + '?action=check&email=' + encodeURIComponent(email) + '&sheetId=' + encodeURIComponent(SHEET_ID)).then(function(r) { return r.json(); });

  handler.then(function(result) {
    USER_EMAIL = email;
    localStorage.setItem('rr_email', email);
    UNLOCKED = {};

    if (result.success && result.products) {
      result.products.forEach(function(pid) { UNLOCKED[pid] = true; });
      showToast('Welcome! ' + result.products.length + ' product' + (result.products.length === 1 ? '' : 's') + ' unlocked');
    } else {
      showToast('Signed in — no purchases found yet');
    }

    closeLoginModal();
    renderLoginBar();
    renderStore();

    if (pendingProduct && (UNLOCKED[pendingProduct] || UNLOCKED['all'])) {
      var product = PRODUCTS.find(function(p) { return p.id === pendingProduct; });
      if (product && product.generatorUrl) setTimeout(function() { openGenerator(product); }, 600);
      pendingProduct = null;
    }
  }).catch(function() {
    showToast('Could not connect — try again');
  });
}

function logout() {
  USER_EMAIL = '';
  UNLOCKED = {};
  localStorage.removeItem('rr_email');
  renderLoginBar();
  renderStore();
  showToast('Signed out');
}

// ━━━ KEYBOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('iframeOverlay').classList.contains('open')) closeGenerator();
    if (document.getElementById('loginModal').classList.contains('open')) closeLoginModal();
    if (document.getElementById('bundlePicker').classList.contains('open')) closeBundlePicker();
  }
  if (e.key === 'Enter' && document.getElementById('loginModal').classList.contains('open')) submitLogin();
  if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'topEmailInput') loginFromBar();
});

// ━━━ REFRESH ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function refreshStore() {
  showToast('Refreshing...');
  loadProducts();
  if (USER_EMAIL) { doLogin(USER_EMAIL); }
}

// ━━━ TOAST ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// ━━━ BG ANIMATION (portal energy particles) ━━━━
(function() {
  var c = document.getElementById('bgCanvas'), x = c.getContext('2d'), W, H;
  var motes = [];
  function rnd(a, b) { return a + Math.random() * (b - a); }
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; init(); }
  function init() {
    motes = [];
    var n = Math.max(20, Math.floor(W / 35));
    for (var i = 0; i < n; i++) {
      motes.push({
        x: rnd(0, W), y: rnd(0, H), r: rnd(0.3, 1.4),
        vy: rnd(-0.05, 0.03), vx: rnd(-0.03, 0.03),
        tw: rnd(0, 6.28), ts: rnd(0.004, 0.014),
        type: Math.random() < 0.5 ? 'arcane' : 'cyan'
      });
    }
  }
  function frame() {
    x.clearRect(0, 0, W, H);
    // Central glow
    var g = x.createRadialGradient(W / 2, H * 0.3, 0, W / 2, H * 0.3, Math.min(W, H) * 0.5);
    g.addColorStop(0, 'hsla(267,100%,50%,0.04)');
    g.addColorStop(1, 'transparent');
    x.fillStyle = g; x.fillRect(0, 0, W, H);
    for (var i = 0; i < motes.length; i++) {
      var m = motes[i];
      m.y += m.vy; m.x += m.vx + Math.sin(m.tw) * 0.05; m.tw += m.ts;
      if (m.y < -4) m.y = H + 4; if (m.y > H + 4) m.y = -4;
      if (m.x < -4) m.x = W + 4; if (m.x > W + 4) m.x = -4;
      var a = 0.15 + 0.45 * Math.abs(Math.sin(m.tw));
      x.beginPath(); x.arc(m.x, m.y, m.r, 0, 6.28);
      if (m.type === 'arcane') {
        x.shadowColor = 'rgba(106,0,255,0.5)'; x.fillStyle = 'rgba(106,0,255,' + (0.4 * a) + ')';
      } else {
        x.shadowColor = 'rgba(0,240,255,0.5)'; x.fillStyle = 'rgba(0,240,255,' + (0.35 * a) + ')';
      }
      x.shadowBlur = 6; x.fill();
    }
    requestAnimationFrame(frame);
  }
  addEventListener('resize', resize);
  resize(); frame();
})();

// ━━━ LOAD BUNDLES FROM GOOGLE SHEET ━━━━━━━━━━
function loadBundles() {
  var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?sheet=Bundles&_t=' + Date.now();
  var cbName = 'rrBundleCallback_' + Date.now();
  window[cbName] = function(resp) {
    delete window[cbName];
    try {
      var cols = resp.table.cols;
      var rows = resp.table.rows;
      BUNDLES = {};

      // Find column indices by header label
      var idxBundleId = -1, idxProductIds = -1;
      cols.forEach(function(col, i) {
        var label = (col.label || '').toLowerCase().trim();
        if (label === 'bundle_id') idxBundleId = i;
        if (label === 'product_ids') idxProductIds = i;
      });

      // Fallback to positions 0 and 4 if headers not found
      if (idxBundleId === -1) idxBundleId = 0;
      if (idxProductIds === -1) idxProductIds = 4;

      rows.forEach(function(row) {
        var get = function(i) { var c = row.c[i]; return c && c.v != null ? String(c.v) : ''; };
        var bundleId = get(idxBundleId).toLowerCase().trim();
        var productIds = get(idxProductIds).toLowerCase().trim();
        if (bundleId && productIds) {
          BUNDLES[bundleId] = productIds.split(',').map(function(p) { return p.trim(); }).filter(Boolean);
        }
      });

      console.log('Bundles loaded:', BUNDLES);
    } catch(e) { console.error('Bundle load error:', e); }
  };
  var script = document.createElement('script');
  script.src = url + '&tqx=responseHandler:' + cbName;
  document.body.appendChild(script);
}

// ━━━ BUNDLE PICKER ━━━━━━━━━━━━━━━━━━━━━━━━━━
function openBundlePicker(bundleId, bundleTitle, bundleDesc, productIds, bundleAccessType) {
  document.getElementById('bundlePickerTitle').textContent = bundleTitle;
  document.getElementById('bundlePickerSub').textContent = bundleDesc || 'Choose a generator to open';
  document.getElementById('bundlePicker').classList.add('open');

  var list = document.getElementById('bundlePickerList');

  if (!productIds || productIds.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;">No generators configured. Add product IDs to the generator_url column for this bundle.</p>';
    return;
  }

  list.innerHTML = productIds.map(function(pid) {
    var product = PRODUCTS.find(function(p) { return p.id.toLowerCase() === pid; });
    if (!product) return '<div class="bundle-item bundle-item-locked"><div><div class="bundle-item-title">' + pid + '</div><div class="bundle-item-desc">Product not found — check ID in Products sheet</div></div></div>';
    var hasAccess = UNLOCKED[pid] || UNLOCKED[bundleId.toLowerCase()] || UNLOCKED['all'] || bundleAccessType === 'free' || product.accessType === 'free';
    var lockedClass = hasAccess ? '' : ' bundle-item-locked';
    var btn = hasAccess
      ? '<button class="btn-launch" onclick="launchBundleItem(\'' + pid + '\')">Launch</button>'
      : '<button class="btn-launch" style="background:var(--muted);cursor:default" disabled>Locked</button>';
    return '<div class="bundle-item' + lockedClass + '">' +
      '<div><div class="bundle-item-title">' + product.title + '</div>' +
      '<div class="bundle-item-desc">' + (product.description || '') + '</div></div>' +
      btn + '</div>';
  }).join('');
}

function closeBundlePicker() {
  document.getElementById('bundlePicker').classList.remove('open');
}

function launchBundleItem(pid) {
  var product = PRODUCTS.find(function(p) { return p.id.toLowerCase() === pid; });
  if (product && product.generatorUrl) {
    closeBundlePicker();
    openGenerator(product);
  } else {
    showToast('Generator URL not configured for this product');
  }
}

// ━━━ SETTINGS SHEET → CUBE PHOTOS ━━━━━━━━━━━
// Sheet tab name: "Settings" — two columns: Key | Value
// Keys: cube_front, cube_back, cube_left, cube_right, cube_top, cube_bottom
// Called via the Apps Script web app (same URL used for access checks)
function loadSettings() {
  if (!APPS_SCRIPT_URL) return;
  var url = APPS_SCRIPT_URL + '?action=getSettings' + (SHEET_ID ? '&sheetId=' + encodeURIComponent(SHEET_ID) : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.success && result.settings) applyCubePhotos(result.settings);
    })
    .catch(function(e) { console.error('Settings load error:', e); });
}

function applyCubePhotos(settings) {
  var faces = ['front','back','left','right','top','bottom'];
  var anySection = false;
  [['cube1','cube_'],['cube2','cube2_']].forEach(function(pair) {
    var cube = document.getElementById(pair[0]);
    if (!cube) return;
    var hasAny = false;
    faces.forEach(function(face) {
      var url = settings[pair[1] + face];
      if (url) { cube.setAttribute(face, url); hasAny = true; }
    });
    if (hasAny) { cube.innerHTML = ''; cube.connectedCallback(); anySection = true; }
  });
  if (anySection) { var sec = document.getElementById('showcaseSection'); if (sec) sec.style.display = ''; }
}

// ━━━ INIT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
renderLoginBar();
loadProducts();
loadBundles();
loadSettings();
if (USER_EMAIL) { doLogin(USER_EMAIL); }
</script>

<script>
/* ═══════════════════════════════════════════════
   PHOTO-CUBE — Draggable 3D Web Component
   Drop <photo-cube front="url" back="url" ... size="260"></photo-cube> anywhere.
   Click the front face to open a fullscreen overlay.
   ═══════════════════════════════════════════════ */
(function () {
  var FACES = [
    { name: 'front',  css: 'translateZ({h}px)',                 normal: [ 0,  0,  1] },
    { name: 'back',   css: 'rotateY(180deg) translateZ({h}px)', normal: [ 0,  0, -1] },
    { name: 'left',   css: 'rotateY(-90deg) translateZ({h}px)', normal: [-1,  0,  0] },
    { name: 'right',  css: 'rotateY(90deg) translateZ({h}px)',  normal: [ 1,  0,  0] },
    { name: 'top',    css: 'rotateX(90deg) translateZ({h}px)',  normal: [ 0, -1,  0] },
    { name: 'bottom', css: 'rotateX(-90deg) translateZ({h}px)', normal: [ 0,  1,  0] },
  ];

  function frontFace(rotX, rotY, faceUrls) {
    var rx = rotX * Math.PI / 180, ry = rotY * Math.PI / 180;
    var best = null, bestZ = -Infinity;
    FACES.forEach(function(f) {
      var nx = f.normal[0], ny = f.normal[1], nz = f.normal[2];
      var nz2 = -Math.sin(ry) * nx + Math.cos(ry) * nz;
      var nz3 =  Math.sin(rx) * ny + Math.cos(rx) * nz2;
      if (nz3 > bestZ) { bestZ = nz3; best = f.name; }
    });
    return (best && faceUrls[best]) ? faceUrls[best] : null;
  }

  var sharedOverlay = null;
  function getOverlay() {
    if (sharedOverlay) return sharedOverlay;
    var ov = document.createElement('div');
    ov.style.cssText = 'display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.92);align-items:center;justify-content:center;cursor:zoom-out;';
    var img = document.createElement('img');
    img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:12px;border:2px solid rgba(106,0,255,0.5);box-shadow:0 0 60px rgba(106,0,255,0.4);';
    ov.appendChild(img);
    ov.addEventListener('click', function() { ov.style.display = 'none'; });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') ov.style.display = 'none'; });
    document.body.appendChild(ov);
    sharedOverlay = ov;
    return ov;
  }
  function openOverlay(url) {
    var ov = getOverlay();
    ov.querySelector('img').src = url;
    ov.style.display = 'flex';
  }

  if (customElements.get('photo-cube')) return;

  customElements.define('photo-cube', class extends HTMLElement {
    connectedCallback() {
      var self = this;
      self._size = parseInt(self.getAttribute('size')) || 260;
      self._speed = parseFloat(self.getAttribute('speed')) || 1;
      self._faceUrls = {};
      FACES.forEach(function(f) {
        var v = self.getAttribute(f.name);
        if (v && v !== 'YOUR_PHOTO_URL_HERE') self._faceUrls[f.name] = v;
      });
      self._build();
    }
    _build() {
      var self = this, size = self._size, half = size / 2;
      var speed = self._speed, BASE = 0.15 / speed;
      var faceUrls = self._faceUrls;

      var style = document.createElement('style');
      style.textContent =
        '.pc-wrap{display:inline-block;text-align:center;}' +
        '.pc-scene{width:' + size + 'px;height:' + size + 'px;perspective:900px;margin:0 auto;cursor:grab;user-select:none;-webkit-user-select:none;}' +
        '.pc-scene:active{cursor:grabbing;}' +
        '.pc-cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;}' +
        '.pc-face{position:absolute;width:' + size + 'px;height:' + size + 'px;background-size:cover;background-position:center;border:2px solid rgba(106,0,255,0.5);box-shadow:inset 0 0 20px rgba(0,0,0,0.4);cursor:pointer;transition:box-shadow 0.2s;background-color:rgba(20,10,40,0.8);}' +
        '.pc-face:hover{box-shadow:inset 0 0 0 3px rgba(0,240,255,0.7),0 0 30px rgba(0,240,255,0.3);}' +
        '.pc-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.2);font-size:11px;font-family:monospace;text-align:center;padding:12px;}';
      self.appendChild(style);

      var wrap  = document.createElement('div'); wrap.className = 'pc-wrap';
      var scene = document.createElement('div'); scene.className = 'pc-scene';
      var cube  = document.createElement('div'); cube.className  = 'pc-cube';

      FACES.forEach(function(f) {
        var el = document.createElement('div'); el.className = 'pc-face';
        el.style.transform = f.css.replace(/\{h\}/g, half);
        if (faceUrls[f.name]) {
          el.style.backgroundImage = 'url(' + faceUrls[f.name] + ')';
        } else {
          el.innerHTML = '<div class="pc-placeholder">📸<br>' + f.name.toUpperCase() + '<br>add image url</div>';
        }
        cube.appendChild(el);
      });

      scene.appendChild(cube); wrap.appendChild(scene); self.appendChild(wrap);

      var rotX = -20, rotY = 0, velX = 0, velY = BASE;
      var dragging = false, dragged = false, startX, startY, lastX, lastY;

      (function loop() {
        if (!dragging) {
          velY += (BASE - velY) * 0.03; velX += (0 - velX) * 0.03;
          rotY += velY; rotX += velX;
        }
        cube.style.transform = 'rotateX(' + rotX + 'deg) rotateY(' + rotY + 'deg)';
        requestAnimationFrame(loop);
      })();

      scene.addEventListener('mousedown', function(e) { dragging=true; dragged=false; velX=0; velY=0; startX=lastX=e.clientX; startY=lastY=e.clientY; });
      window.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var dx=e.clientX-lastX, dy=e.clientY-lastY;
        if (Math.hypot(e.clientX-startX,e.clientY-startY)>8) dragged=true;
        rotY+=dx*0.4; rotX+=dy*0.4; velY=dx*0.4; velX=dy*0.4; lastX=e.clientX; lastY=e.clientY;
      });
      window.addEventListener('mouseup', function() { dragging=false; });
      scene.addEventListener('touchstart', function(e) { dragging=true; dragged=false; velX=0; velY=0; startX=lastX=e.touches[0].clientX; startY=lastY=e.touches[0].clientY; }, {passive:true});
      scene.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        var dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
        if (Math.hypot(e.touches[0].clientX-startX,e.touches[0].clientY-startY)>8) dragged=true;
        rotY+=dx*0.4; rotX+=dy*0.4; velY=dx*0.4; velX=dy*0.4; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; e.preventDefault();
      }, {passive:false});
      scene.addEventListener('touchend', function() { dragging=false; });
      scene.addEventListener('click', function() {
        if (dragged) return;
        var url = frontFace(rotX, rotY, faceUrls);
        if (url) openOverlay(url);
      });
    }
  });
})();
</script>
